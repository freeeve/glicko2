name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "These files are not gofmt-ed:"
            echo "$out"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: test
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: fuzz (smoke)
        run: go test -run '^$' -fuzz FuzzUpdate -fuzztime 20s ./...
